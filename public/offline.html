<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="theme-color" content="#059669">
        <title>Offline - GlobalDrop</title>
        <style>
            :root {
                color-scheme: light;
                font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: #f8fafc;
                color: #18181b;
            }

            body {
                align-items: center;
                display: flex;
                margin: 0;
                min-height: 100vh;
                padding: 24px;
            }

            main {
                margin: 0 auto;
                max-width: 520px;
            }

            .brand {
                align-items: center;
                display: flex;
                gap: 12px;
                font-weight: 800;
                letter-spacing: 0;
            }

            .mark {
                align-items: center;
                background: #059669;
                border-radius: 8px;
                color: #fff;
                display: inline-flex;
                height: 44px;
                justify-content: center;
                width: 44px;
            }

            h1 {
                font-size: clamp(2rem, 8vw, 3rem);
                line-height: 1;
                margin: 32px 0 12px;
            }

            p {
                color: #52525b;
                font-size: 1rem;
                line-height: 1.7;
                margin: 0;
            }

            a {
                color: #047857;
                display: inline-block;
                font-weight: 700;
                margin-top: 24px;
                text-decoration: none;
            }
        </style>
    </head>
    <body>
        <main>
            <div class="brand">
                <span class="mark">GD</span>
                <span>GlobalDrop</span>
            </div>
            <h1>You're offline</h1>
            <p>
                The storefront needs a connection to refresh products, cart, checkout, and support details.
                Reconnect and try again.
            </p>
            <a href="/">Back to storefront</a>
        </main>
    </body>
</html>
