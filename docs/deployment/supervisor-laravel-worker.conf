[program:laravel-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/dropship-platform/artisan queue:work redis --tries=3 --timeout=90
directory=/var/www/dropship-platform
user=www-data
numprocs=2
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
redirect_stderr=false
stdout_logfile=/var/www/dropship-platform/storage/logs/worker.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stderr_logfile=/var/www/dropship-platform/storage/logs/worker-error.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=5
stopwaitsecs=3600
